<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Page not found — Pour</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#FAF8F4" />
<meta name="color-scheme" content="light" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<style>
  :root{--paper:#FAF8F4;--ink:#1B1714;--ink-soft:#4A433C;--muted:#6E645A;--accent:#B96E2C;--accent-tint:#B96E2C14;--line:rgba(27,23,20,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,Segoe UI,Roboto,sans-serif;
    background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;flex-direction:column}
  a{color:var(--accent);text-decoration:none}
  header{display:flex;align-items:center;height:64px;padding:0 24px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:680;letter-spacing:-.02em;font-size:19px;color:var(--ink)}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;gap:14px}
  .code{font-size:13px;font-weight:680;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  h1{font-size:clamp(32px,6vw,48px);letter-spacing:-.02em;line-height:1.05}
  p{color:var(--ink-soft);font-size:18px;max-width:42ch}
  .btn{margin-top:10px;display:inline-flex;background:var(--ink);color:var(--paper);font-weight:560;
    padding:13px 22px;border-radius:13px}
  footer{padding:24px;text-align:center;color:var(--muted);font-size:13.5px;border-top:1px solid var(--line)}
  footer a{color:var(--ink-soft);margin:0 8px}
</style>
</head>
<body>
<header><a class="brand" href="index.html"><span class="dot"></span>Pour</a></header>
<main>
  <span class="code">404</span>
  <h1>This page poured out.</h1>
  <p>We couldn't find what you were looking for — but your journal's still right where you left it.</p>
  <a class="btn" href="index.html">Back home</a>
</main>
<footer>
  <a href="index.html">Home</a> · <a href="support.html">Support</a> ·
  <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>

</html>
