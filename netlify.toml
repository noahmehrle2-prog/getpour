# Netlify config — no build step (static site).
[build]
  publish = "."

# Security + privacy headers on every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), interest-cohort=()"
    # The pages inline their CSS, JS, and JSON-LD, so 'unsafe-inline' is required.
    # img-src allows https + data so real screenshots / OG images work once added.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"

# Long-cache the static asset(s); HTML stays revalidated by default.
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
